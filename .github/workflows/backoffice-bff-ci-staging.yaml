name: backoffice-bff service ci staging

on:
  push:
    branches:
      - "rc*"
    paths:
      - "backoffice-bff/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-bff-ci-staging.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions
      - name: Run Maven Verify
        run: mvn clean verify -f backoffice-bff
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker Tag
        run: |
          echo "tags=${{ secrets.DOCKERHUB_USERNAME }}/yas-backoffice-bff:${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice-bff
          push: true
          tags: ${{ env.tags }}
