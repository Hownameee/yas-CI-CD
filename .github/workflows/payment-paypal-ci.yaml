name: payment-paypal service ci

on:
  push:
    paths:
      - "payment-paypal/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/payment-paypal-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "payment-paypal/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/payment-paypal-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl payment-paypal -am
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker Tag
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "DOCKER_TAG=latest" >> $GITHUB_ENV
          else
            echo "DOCKER_TAG=${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./payment-paypal
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/yas-payment-paypal:${{ env.DOCKER_TAG }}