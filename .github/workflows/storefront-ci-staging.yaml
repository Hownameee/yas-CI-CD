name: storefront service ci staging

on:
  push:
    branches:
      - "rc*"
    paths:
      - "storefront/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-ci-staging.yaml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: storefront
      - run: npm run build
        working-directory: storefront
      - run: npm run lint
        working-directory: storefront
      - run: npx prettier --check .
        working-directory: storefront
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker Tag
        run: |
          echo "tags=${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront:${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: ${{ env.tags }}
