apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/Hownameee/yas-CI-CD.git'
      targetRevision: main
      path: k8s-cd/charts/yas-umbrella
      helm:
        valueFiles:
          - $values/dev/values.yaml
    - repoURL: 'https://github.com/Hownameee/yas-GitOps.git'
      targetRevision: main
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: yas-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
