apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: backoffice-bff-retry
  namespace: ${NAMESPACE}
spec:
  hosts:
    - backoffice-bff
    - backoffice-bff.${NAMESPACE}.svc.cluster.local
  http:
    - timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: 5xx,connect-failure,refused-stream,gateway-error
      route:
        - destination:
            host: backoffice-bff.${NAMESPACE}.svc.cluster.local
            port:
              number: 80
---
