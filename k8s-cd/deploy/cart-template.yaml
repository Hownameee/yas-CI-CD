apiVersion: v1
kind: Service
metadata:
  name: cart
  labels:
    helm.sh/chart: backend-0.1.0
    app.kubernetes.io/name: cart
    app.kubernetes.io/instance: cart
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
