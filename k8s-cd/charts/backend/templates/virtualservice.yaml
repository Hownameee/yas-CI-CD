{{- if .Values.istio.enabled -}}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ include "backend.fullname" . }}
  http:
    - route:
        - destination:
            host: {{ include "backend.fullname" . }}
      retries:
        attempts: {{ .Values.istio.retries.attempts | default 3 }}
        retryOn: {{ .Values.istio.retries.retryOn | default "5xx,connect-failure" }}
{{- end }}
