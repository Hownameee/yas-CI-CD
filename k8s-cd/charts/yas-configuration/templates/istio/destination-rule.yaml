apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: default
  namespace: {{ .Release.Namespace }}
spec:
  host: "*.{{ .Release.Namespace }}.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
# Disable mTLS when connecting to Postgres
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: postgres-disable-mtls
  namespace: {{ .Release.Namespace }}
spec:
  host: postgresql.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: postgres-repl-disable-mtls
  namespace: {{ .Release.Namespace }}
spec:
  host: postgresql-repl.{{ .Release.Namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
