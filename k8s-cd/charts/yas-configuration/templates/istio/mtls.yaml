---
# Kafka exclusion
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: kafka-permissive
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      strimzi.io/kind: Kafka
  mtls:
    mode: PERMISSIVE
---
# Kafka Connect REST is reconciled by the Strimzi operator outside this mesh namespace.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: kafka-connect-permissive
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      strimzi.io/kind: KafkaConnect
  mtls:
    mode: PERMISSIVE
---
# Zookeeper exclusion
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: zookeeper-permissive
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      strimzi.io/kind: Zookeeper
  mtls:
    mode: PERMISSIVE
