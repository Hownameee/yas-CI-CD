apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: {{ .Release.Namespace }}
spec:
  mtls:
    mode: STRICT
---
# Postgres requires PERMISSIVE or DISABLE for native binary protocol compatibility
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: postgres-permissive
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      cluster-name: postgresql
  mtls:
    mode: PERMISSIVE
