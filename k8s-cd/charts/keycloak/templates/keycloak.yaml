apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  bootstrapAdmin:
    user:
      secret: keycloak-credentials
  db:
    vendor: postgres
    usernameSecret:
      name: postgresql-credentials
      key: username
    passwordSecret:
      name: postgresql-credentials
      key: password
    host: postgresql
    database: keycloak
    port: 5432
  http:
    httpEnabled: true
    httpPort: 8080
  hostname:
    hostname: {{ .Values.hostname }}
    backchannelDynamic: false
    strict: false
  proxy:
    headers: xforwarded
  ingress:
    enabled: false
  unsupported:
   podTemplate:
     spec:
       volumes:
         - name: yas-themes
           configMap:
             name: yas-themes-configmap
       containers:
         - name: keycloak
           volumeMounts:
             - name: yas-themes
               mountPath: /opt/keycloak/providers
