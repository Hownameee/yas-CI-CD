{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "zookeeper.serviceAccountName" . }}
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
  {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
