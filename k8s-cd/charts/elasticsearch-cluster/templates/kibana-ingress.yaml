apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  ingressClassName: {{ .Values.kibana.ingress.className }}
  rules:
    - host: {{ .Values.kibana.ingress.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana-kb-http
                port:
                  number: 5601
